; P008 — SCT-013-000 电流测试固件（NodeMCU 版）
; ============================================================
; 遵循 P008 固件开发规范：
;   ✅ 序列号前缀硬限制（build_flags 传入，缺失则编译报错）
;   ✅ API 路径硬限制（build_flags 传入 API_BASE_URL）
;   ✅ 日志级别控制（LOG_LEVEL 3=INFO, 4=DEBUG）
;   ✅ 配置宏化（所有值均可由 build_flags 覆盖）
;
; 烧录方式：
;   pio run -e nodemcuv3 -t upload --upload-port COM7
;
; 串口监视：
;   pio device monitor -p COM7 -b 115200
;
; 接线：
;   SCT-013-000 红线 → NodeMCU A0
;   SCT-013-000 黑线 → NodeMCU GND
;   SCT-013 夹在用电设备的一根电源线上（零火不分）
; ============================================================

[env:nodemcuv3]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 115200

build_flags =
    -D SERIAL_BAUD=115200
    -D LOG_LEVEL=3
    -D CURRENT_PIN=A0
    -D REPORT_INTERVAL_MS=5000
    -D FIRMWARE_VERSION=\"1.0\"
    -D FIRMWARE_CHANNEL=\"test\"
    -D DEVICE_SERIAL_PREFIX=\"SCT-TEST-\"
    -D AP_NAME=\"P008-SCT-Test\"
    -D HW_SECRET=\"P008@2026!SecretKey\"
    -D API_BASE_URL=\"https://zghj.openyun.xin/api/v1\"

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.16
