; ============================================================
; P008 — ESP-01 继电器模块固件
; ============================================================
; 芯片: ESP8266EX (ESP-01/01S 模块)
; Flash: 1MB (8Mbit) — ESP-01 标配
; USB: 需外接 USB-TTL 烧录器
;
; 烧录接线（USB-TTL → ESP-01）:
;   3.3V  → VCC
;   3.3V  → CH_PD (EN)
;   GND   → GND
;   GND   → GPIO0 (拉低进入下载模式)
;   TX    → RX
;   RX    → TX
;
; 烧录后拔掉 GPIO0→GND，重新上电
;
; 编译上传:
;   pio run -e fw-relay-plug -t upload --upload-port COM3
;
; 注意: ESP-01 没有 USB 转串口芯片，必须用 USB-TTL 烧录
; ============================================================

[env:fw-relay-plug]
platform = espressif8266
board = esp01_1m
framework = arduino
monitor_speed = 115200
upload_speed = 19200
board_boot.flash_mode = dout
lib_deps =
    tzapu/WiFiManager@^2.0.16
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -D SERIAL_BAUD=115200
    -D RELAY_PIN=0          ; GPIO0 — 继电器控制（模块板载已接好）
    -D LED_BUILTIN=2        ; GPIO2 — 板载 LED（低电平亮）
    -D LOG_LEVEL=3
    -D DEVICE_SERIAL_PREFIX=\"RELAY-PL-\"


; ============================================================
; fw-relay-plug-alert — 带本地报警功能的继电器固件
; 基于 fw-relay-plug，增加：
;   - 云端阈值下发解析
;   - 本地 GPIO 过流/欠流报警（LED 快闪）
;   - 报警时强制心跳上报（不等待 60s）
;
; 报警引脚（默认复用板载 LED）:
;   ALARM_PIN = LED_BUILTIN (GPIO2) — 正常: 常亮, 报警: 500ms 快闪
; 如需独立报警引脚：
;   #define ALARM_PIN 13    ; 预留，GPIO13（ESP-01 没有，NodeMCU 用）
; ============================================================
[env:fw-relay-plug-alert]
platform = espressif8266
board = esp01_1m
framework = arduino
monitor_speed = 115200
upload_speed = 19200
board_boot.flash_mode = dout
lib_deps =
    tzapu/WiFiManager@^2.0.16
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -D SERIAL_BAUD=115200
    -D RELAY_PIN=0
    -D LED_BUILTIN=2
    -D ALARM_ENABLE=1      ; 🔴 开启本地报警功能
    -D ALARM_PIN=2         ; 报警输出引脚（复用板载 LED）
    -D LOG_LEVEL=3
    -D DEVICE_SERIAL_PREFIX=\"RELAY-PL-\"


; ============================================================
; NodeMCU v3 变体
; 引脚:
;   RELAY_PIN = D6 (GPIO12) — 继电器控制
;   LED_BUILTIN = D0 (GPIO16) — 板载 LED（低电平亮）
; ============================================================
[env:fw-relay-nodemcu]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps =
    tzapu/WiFiManager@^2.0.16
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -D SERIAL_BAUD=115200
    -D RELAY_PIN=12         ; D6 (GPIO12) — 继电器控制
    -D LED_BUILTIN=2        ; 自行定义（NodeMCU 板载 LED 在 GPIO2(靠近USB)）
    -D LOG_LEVEL=3
    -D DEVICE_SERIAL_PREFIX=\"RELAY-NM-\"
