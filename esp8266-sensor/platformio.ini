; NodeMCU V2（CP2102 USB芯片）
[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.14
    bblanchon/ArduinoJson@^7.0.0
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0
    adafruit/DHT sensor library@^1.4.6
    tzapu/WiFiManager@^2.0.16

build_flags =
    -D SERIAL_BAUD=115200
    -D REPORT_INTERVAL_MS=300000
    -D DEEP_SLEEP_US=290000000
    -D ONE_WIRE_BUS=0     ; DS18B20 数据引脚 (D3/GPIO0)
    -D DHT_PIN=2
    -D DHT_TYPE=D22
    -D CURRENT_PIN=A0
    -D DOOR_PIN=5
    -D LED_BUILTIN=2
    -D USE_DS18B20=1

; NodeMCU V3（CH340 USB芯片，引脚全兼容）
[env:nodemcuv3]
platform = espressif8266
board = nodemcuv2   ; PlatformIO 没有 nodemcuv3，用 nodemcuv2 完全兼容
framework = arduino
monitor_speed = 115200
lib_deps =
    ${env:nodemcuv2.lib_deps}
build_flags =
    ${env:nodemcuv2.build_flags}

; OTA 调试模式（覆盖 build_flags 启用 OTA）
; pio run -t upload --environment nodemcuv2-ota
[env:nodemcuv2-ota]
extends = nodemcuv2
platform = ${env:nodemcuv2.platform}
board = ${env:nodemcuv2.board}
framework = ${env:nodemcuv2.framework}
monitor_speed = ${env:nodemcuv2.monitor_speed}
lib_deps = ${env:nodemcuv2.lib_deps}
build_flags =
    ${env:nodemcuv2.build_flags}
    -D ENABLE_OTA

; ============================================================
; FW-DHT22-PLUG — 插电版 DHT22（标配，无门磁）
;
; 接线:
;   DHT22 DATA → D1 (GPIO5)
;   供电: USB 5V
; ============================================================
[env:fw-dht22-plug]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.14
    tzapu/WiFiManager@^2.0.16
    adafruit/DHT sensor library@^1.4.6

;  [env:fw-dht22-plug] 的 build_flags 区域
build_flags =
    -D SERIAL_BAUD=115200
    -D DEEP_SLEEP_US=60000000
    -D DHT_PIN=5       ; D1 (GPIO5)
    -D LED_BUILTIN=2
    -D LOG_LEVEL=3
    -D DEVICE_SERIAL_PREFIX=\"DHT22-PL-\"   ; 序列号前缀（新设备规范）

; ============================================================
; FW-DHT22-DOOR-PLUG — 插电版 DHT22 + 门磁（练手版）
;
; 接线:
;   DHT22 DATA → D1 (GPIO5)
;   门磁 DATA  → D5 (GPIO14)
;   门磁 GND   → 任意 G（与 DHT22 共地）
;   供电: USB 5V
;
; 编译上传:
;   pio run -e fw-dht22-door-plug -t upload --upload-port COM6
; ============================================================
[env:fw-dht22-door-plug]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.14
    tzapu/WiFiManager@^2.0.16
    adafruit/DHT sensor library@^1.4.6

build_flags =
    -D SERIAL_BAUD=115200
    -D DEEP_SLEEP_US=60000000
    -D DHT_PIN=5       ; D1 (GPIO5)
    -D LED_BUILTIN=2
    -D LOG_LEVEL=3
    -D USE_DOOR_SENSOR=1    ; 启用门磁传感器（D5/GPIO14）
    -D DEVICE_SERIAL_PREFIX=\"DHT22-PL-\"   ; 序列号前缀（新设备规范）

; ============================================================
; FW-DHT22-BATTERY — 定风电池版 DHT22 + deepSleep
;
; 条件:
;   ⚠️ GPIO16 (D0) 必须接到 RST——否则永远醒不来
;   ⚠️ 不支持云端 reportInterval 动态拉取
;
; 接线:
;   D0(GPIO16) → RST（deepSleep 唤醒）
;   D1(GPIO5)  → DHT22 DATA
;   VCC        → 锂电池 3.7V
;
; 功耗: 18650 (3000mAh) → 约 300 天
;
; 编译上传:
;   pio run -e fw-dht22-battery -t upload --upload-port COM3
;
; 注意: 配网后必须断开串口，否则 deepSleep 不会生效
; ============================================================
[env:fw-dht22-battery]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.14
    tzapu/WiFiManager@^2.0.16
    adafruit/DHT sensor library@^1.4.6
build_flags =
    -D SERIAL_BAUD=115200
    -D DEEP_SLEEP_US=300000000    ; 5 分钟 (300 秒)
    -D DHT_PIN=5                  ; D1 (GPIO5)
    -D LOG_LEVEL=3
    -D BATTERY_MODE=1             ; 电池版：启用 deepSleep 模式
    -D DEVICE_SERIAL_PREFIX=\"DHT22-BT-\"   ; 序列号前缀（新设备规范）

; ============================================================
; FW-DS18B20-PLUG — DS18B20 全防水插电版
;
; 用途：冷库/液槽防水测温，USB 供电常在线
;
; 接线:
;   DS18B20 VCC  → 3V3
;   DS18B20 DATA → D3 (GPIO0)
;   DS18B20 GND  → GND
;   DATA-VCC 之间需 4.7kΩ 上拉电阻（模块通常自带）
;   供电: USB 5V
;
; 编译上传:
;   pio run -e fw-ds18b20-plug -t upload --upload-port COM3
; ============================================================
[env:fw-ds18b20-plug]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.16
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0

build_flags =
    -D SERIAL_BAUD=115200
    -D DEEP_SLEEP_US=60000000
    -D ONE_WIRE_BUS=0       ; D3 (GPIO0)
    -D LED_BUILTIN=2
    -D LOG_LEVEL=3
    -D USE_DS18B20=1
    -D DEVICE_SERIAL_PREFIX=\"DS18B20-PL-\"

; ============================================================
; FW-MQ135-PLUG — MQ-135 空气质量传感器插电版
;
; 用途: 监测 NH₃/NOₓ/苯系物/CO₂ 综合空气质量
; 供电: USB 5V
;
; ⚠️ MQ-135 AO 输出 0~5V，8266 ADC 只能承受 0~3.3V
;    必须加分压电路！否则烧 ADC！
;
; 分压电路:
;   MQ-135 AO → 10kΩ 电阻 → A0 (ADC)
;                     ↓
;                   20kΩ 电阻 → GND
;   (10k + 20k 分压: 5V × 20/(10+20) ≈ 3.33V ✅)
;
; 接线:
;   MQ-135 VCC → 3V3（不是 5V！8266 逻辑电平 3.3V 也能工作，但预热略慢）
;   MQ-135 GND → GND
;   MQ-135 AO  → 分压电路 → A0
;   MQ-135 DO  → 不接（留作扩展报警）
;   供电: USB 5V
;
; 编译上传:
;   pio run -e fw-mq135-plug -t upload --upload-port COM3
; ============================================================
[env:fw-mq135-plug]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager@^2.0.16

build_flags =
    -D SERIAL_BAUD=115200
    -D DEEP_SLEEP_US=60000000
    -D LED_BUILTIN=2
    -D LOG_LEVEL=3
    -D USE_MQ135=1
    -D DEVICE_SERIAL_PREFIX=\"AIR-PL-\"
