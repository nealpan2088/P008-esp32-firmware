; ============================================================
; P008 — NodeMCU 1路光耦隔离继电器模块 + SG90 舵机固件
; ============================================================
; 芯片: ESP8266EX (NodeMCU V3)
; Flash: 4MB (32Mbit) — NodeMCU 标配
;
; 接线（NodeMCU → 1路光耦隔离继电器模块）:
;   NodeMCU D1 (GPIO5) → 继电器模块 IN
;   NodeMCU Vin (5V)   → 继电器模块 VCC
;   NodeMCU GND        → 继电器模块 GND
;
; 接线（NodeMCU → SG90 舵机）:
;   NodeMCU D2 (GPIO4) → SG90 🟡(橙色) PWM 信号
;   NodeMCU Vin (5V)   → SG90 🔴(红色) 电源
;   NodeMCU GND        → SG90 🟤(棕色) GND
;
; 编译上传（NodeMCU）:
;   pio run -e fw-relay-nodemcu -t upload
;
; 串口监视:
;   pio run -e fw-relay-nodemcu -t monitor

[env:fw-relay-nodemcu]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager@^2.0.16
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8

build_flags =
    -D MQTT_ENABLE=1
    -D SERIAL_BAUD=115200
    -D RELAY_PIN=5          ; D1 (GPIO5) — 继电器控制信号
    -D LED_BUILTIN=2        ; D4 (GPIO2) — 板载 LED
    -D BTN_PIN=0            ; D3 (GPIO0) — FLASH 按钮（短按切换，长按配网）
    -D LOG_LEVEL=3
    -D DEVICE_SERIAL_PREFIX=\"RELAY-NM-\"


; ============================================================
; 带本地报警功能的继电器固件
; ============================================================
; 基于 fw-relay-nodemcu，增加：
;   - 云端阈值下发解析
;   - 本地温度/湿度阈值报警（LED 快闪）
;   - 报警时强制心跳上报
;
; 编译上传:
;   pio run -e fw-relay-nodemcu-alert -t upload
; ============================================================
[env:fw-relay-nodemcu-alert]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager@^2.0.16
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -D SERIAL_BAUD=115200
    -D RELAY_PIN=5          ; D1 (GPIO5) — 继电器控制信号
    -D LED_BUILTIN=2        ; D4 (GPIO2) — 板载 LED（报警也复用它）
    -D BTN_PIN=0            ; D3 (GPIO0) — FLASH 按钮
    -D LOG_LEVEL=3
    -D ALARM_ENABLE=1       ; 🔴 开启本地报警功能
    -D ALARM_PIN=2          ; 报警输出引脚（复用板载 LED）
    -D DEVICE_SERIAL_PREFIX=\"RELAY-NM-\"
