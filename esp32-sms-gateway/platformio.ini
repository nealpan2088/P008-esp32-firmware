; ============================================================
; P008 — ESP32 + A7670C 短信报警网关
; ============================================================
; 功能: 通过 MQTT 接收报警消息，驱动 A7670C 4G 模块发短信
;
; 接线 (ESP32-S3 → A7670C):
;   ESP32 GPIO18 (RX2) → A7670C TX
;   ESP32 GPIO19 (TX2) → A7670C RX
;   ESP32 5V          → A7670C VCC (注意供电能力)
;   ESP32 GND         → A7670C GND
;
; A7670C 需要独立 2A 电源，不建议从 ESP32 取电
;
; 编译上传:
;   pio run -t upload
;
; 串口监视:
;   pio device monitor -b 115200

[env:esp32-sms-gateway]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM11
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.3.1
    https://github.com/tzapu/WiFiManager.git

build_flags =
    -D SERIAL_BAUD=115200
    -D LOG_LEVEL=3
    ; 以下两个参数可在 platformio.ini 中或通过环境变量覆盖，不用改代码
    ; -D MQTT_BROKER=\"zghj.openyun.xin\"
    ; -D MQTT_PORT=1883
